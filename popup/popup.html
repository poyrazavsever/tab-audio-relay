<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Bridge</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Audio Bridge</h2>
            <p>Sekmeler arası ses senkronu</p>
        </div>
        
        <div class="bridge-control">
            <span id="bridgeStatus">Köprü Kapalı</span>
            <label class="switch">
                <input type="checkbox" id="bridgeToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="tab-selection">
            <div class="tab-group">
                <label for="sourceTab">Kaynak (Eğitim, Video vs.)</label>
                <select id="sourceTab">
                    <option value="">Seçiniz...</option>
                </select>
            </div>
            
            <div class="tab-group">
                <label for="targetTab">Hedef (Müzik, Spotify vs.)</label>
                <select id="targetTab">
                    <option value="">Seçiniz...</option>
                </select>
            </div>
        </div>

        <div class="settings">
            <div class="tab-group">
                <label for="delayInput">Geçiş Gecikmesi (ms)</label>
                <input type="number" id="delayInput" value="500" min="0" max="5000" step="100">
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
